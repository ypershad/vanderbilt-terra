# cohorts.yaml — per-cohort parser configs for hematuria (phecode 593) meta-analysis.
#
# STATUS: SCAFFOLD. Metadata below (cohort/ancestry/phenodef/liftover intent) is
# known from filenames + the brief. Every `column_map` is left as TODO on purpose:
# no column mapping is hardcoded until `scripts/00_inspect_cohorts.py` output is
# confirmed. Fill `column_map` and set `build_confirmed: true` per file, then the
# harmonizer reads exclusively from this file (one config per cohort, no if/else).
#
# Target common schema (harmonized output columns):
#   CHR POS(GRCh38) EA NEA EAF BETA SE P N N_CASES N_CONTROLS INFO
#   + key38 = "CHR:POS:sorted(REF,ALT)"  (surfaces palindromic/strand issues)
#
# effect_scale: log_odds | OR  (if OR -> harmonizer takes ln(OR); brief wants IVW
#   on a comparable log-odds scale, so this must be verified per cohort).
# pval_field: P | LOG10P | MLOGP  (REGENIE=LOG10P; keep log10 internally to avoid
#   underflow; FinnGen/pheweb often carry mlogp).

defaults:
  target_build: GRCh38
  # Confirmed VM layout: hematuria_gwas/ is a SIBLING of the repo under edit/.
  #   repo:     $HOME/bicklab-pershad/edit/vanderbilt-terra
  #   data_dir: $HOME/bicklab-pershad/edit/hematuria_gwas
  #   biovu_results: $HOME/bicklab-pershad/edit/hematuria_gwas/biovu_results
  # From the repo, DATA_DIR = "../hematuria_gwas" (anchor everything to it + p()).
  data_dir_vm: "$HOME/bicklab-pershad/edit/hematuria_gwas"
  # Environment reality (confirmed): METAL + polars + matplotlib PRESENT.
  # MISSING and required before those steps can run:
  #   - liftover: pyliftover OR CrossMap  (needed for GRCh37 cohorts -> 38)
  #       + UCSC chain file hg19ToHg38.over.chain.gz
  #   - MR-MEGA binary (primary trans-ancestry). Fixed-effect METAL trans-ancestry
  #       sensitivity can run without it.
  # QC thresholds (Task 1.4). Applied per-cohort, each drop count logged.
  qc:
    eaf_min: 0.001
    eaf_max: 0.999
    mac_min: 20          # used instead of eaf bounds where N present
    info_min: 0.3
    abs_beta_max: 10
    require_se_positive_finite: true
    require_nonmissing_p: true
    autosomes_only_default: true   # chrX kept only where cohort reported it

cohorts:

  # ---- BioVU AGD250k, REGENIE 4.0. 8 strata (2 ancestry x 4 phenodef). ----
  # NOTE: 593 vs GU_593 and the .2 suffix are DIFFERENT phenotype definitions.
  # Never mix definitions in one meta. Each entry is its own stratum.
  # Likely REGENIE cols: CHROM GENPOS ID ALLELE0 ALLELE1 A1FREQ INFO N TEST BETA
  #   SE CHISQ LOG10P — EA=ALLELE1, NEA=ALLELE0. CONFIRM from inspect output +
  #   confirm a Firth run (TEST column / EXTRA). Do not assume.
  biovu_agd250k:
    format: regenie
    build_claim: GRCh38
    build_confirmed: false        # TODO
    liftover: false
    effect_scale: log_odds        # REGENIE --bt; CONFIRM Firth
    pval_field: LOG10P
    column_map: {}                # TODO after inspect
    strata:
      - {file: agd250k_eur.593.pvalue_ordered.regenie.gz,      ancestry: EUR, phenodef: "593"}
      - {file: agd250k_eur.593.2.pvalue_ordered.regenie.gz,    ancestry: EUR, phenodef: "593.2"}
      - {file: agd250k_eur.GU_593.pvalue_ordered.regenie.gz,   ancestry: EUR, phenodef: "GU_593"}
      - {file: agd250k_eur.GU_593.2.pvalue_ordered.regenie.gz, ancestry: EUR, phenodef: "GU_593.2"}
      - {file: agd250k_afr.593.pvalue_ordered.regenie.gz,      ancestry: AFR, phenodef: "593"}
      - {file: agd250k_afr.593.2.pvalue_ordered.regenie.gz,    ancestry: AFR, phenodef: "593.2"}
      - {file: agd250k_afr.GU_593.pvalue_ordered.regenie.gz,   ancestry: AFR, phenodef: "GU_593"}
      - {file: agd250k_afr.GU_593.2.pvalue_ordered.regenie.gz, ancestry: AFR, phenodef: "GU_593.2"}

  # ---- MGI, EUR. Filename asserts GRCh38. Format unknown (SAIGE? REGENIE?). ----
  mgi:
    file: mgi_eur_X593.output_GRCh38.gz
    ancestry: EUR
    phenodef: X593
    format: UNKNOWN               # TODO from inspect
    build_claim: GRCh38
    build_confirmed: false
    liftover: false
    effect_scale: UNKNOWN         # TODO (OR vs BETA)
    pval_field: UNKNOWN
    column_map: {}

  # ---- UKB PheWeb. Likely GRCh37 -> LIFTOVER to 38. ----
  ukb:
    file: ukb_pheweb_phenocode-593.tsv.gz
    ancestry: EUR
    phenodef: "593"
    format: pheweb?
    build_claim: GRCh37
    build_confirmed: false
    liftover: true                # CONFIRM build first, then lift
    effect_scale: UNKNOWN
    pval_field: UNKNOWN
    column_map: {}

  # ---- FinnGen R7. GRCh38. Standard FinnGen sumstat schema. ----
  finngen:
    file: summary_stats_finngen_R7_R18_UNSPE_HAEMATU.gz
    ancestry: FIN                 # Finnish; grouped with EUR meta per brief
    phenodef: R18_UNSPE_HAEMATU
    format: finngen
    build_claim: GRCh38
    build_confirmed: false
    liftover: false
    effect_scale: log_odds        # FinnGen reports beta (log-odds); CONFIRM
    pval_field: UNKNOWN           # has both pval and mlogp; prefer mlogp internally
    column_map: {}

  # ---- Taiwan Biobank. BUILD UNKNOWN — must check explicitly. ----
  taiwan:
    file: 593_Taiwan_biobank_Aug132025.tsv.gz
    ancestry: EAS
    phenodef: "593"
    format: UNKNOWN
    build_claim: UNKNOWN          # CHECK EXPLICITLY -> may require liftover
    build_confirmed: false
    liftover: UNKNOWN
    effect_scale: UNKNOWN
    pval_field: UNKNOWN
    column_map: {}

  # ---- KoGES (Korean). Likely GRCh37 -> LIFTOVER. ----
  koges:
    file: phenocode-KoGES_BLOODU.tsv.gz
    ancestry: EAS
    phenodef: BLOODU
    format: pheweb?
    build_claim: GRCh37
    build_confirmed: false
    liftover: true                # CONFIRM
    effect_scale: UNKNOWN
    pval_field: UNKNOWN
    column_map: {}

# Meta-analysis grouping (Task 3). Recorded here so it's version-controlled.
meta_groups:
  within_ancestry:
    EUR: [biovu_agd250k(EUR), mgi, ukb, finngen]   # FIN grouped into EUR meta
    AFR: [biovu_agd250k(AFR)]                        # single cohort for now
    EAS: [taiwan, koges]
  trans_ancestry:
    primary: MR-MEGA               # models allelic heterogeneity by ancestry axes
    sensitivity: METAL_fixed_effect
  primary_phenodef: "593"          # alternates (593.2 / GU_593 / GU_593.2) = sensitivity metas
